<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playground 09 — @theme token</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme {
            --color-text-primary: #302F2F;
        }

        @layer base {
            body {
                color: var(--color-text-primary);
                @apply bg-neutral-50 p-8 text-lg;
            }
        }

        .token-border {
            border: 3px solid var(--color-text-primary);
            @apply rounded-lg p-4 mt-4 max-w-md bg-white;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/lenis@1.3.11/dist/lenis.min.js"></script>
    <script src="../../assets/js/global-lenis.js" defer></script>
</head>
<body>
<p>Body text color comes from <code>var(--color-text-primary)</code> in <code>@layer base</code>.</p>
<div class="token-border">
    This box border uses the same token. Change <code>--color-text-primary</code> inside <code>@theme</code> (e.g. to <code>#c026d3</code>), save, refresh — both update.
</div>
</body>
</html>
