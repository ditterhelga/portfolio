<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playground 12 — click + classList</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-neutral-100 p-8 text-neutral-800;
            }
        }

        .panel {
            @apply rounded-xl border-2 border-neutral-300 bg-white p-6 max-w-md transition-colors duration-200;
        }

        .panel.is-active {
            @apply border-blue-500 bg-blue-50;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/lenis@1.3.11/dist/lenis.min.js"></script>
    <script src="../../assets/js/global-lenis.js" defer></script>
</head>
<body>
<button type="button" id="toggle-btn"
        class="mb-4 rounded-lg bg-neutral-900 px-4 py-2 text-white text-sm font-medium hover:bg-neutral-700">
    Toggle panel state
</button>
<div id="panel" class="panel" role="status" aria-live="polite">
    <p class="font-medium mb-1">Panel</p>
    <p class="text-sm text-neutral-600">Same pattern as the burger: <code>querySelector</code> + <code>click</code> + <code>classList.toggle</code>. No GSAP here.</p>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const btn = document.querySelector("#toggle-btn");
        const panel = document.querySelector("#panel");
        if (!btn || !panel) return;

        btn.addEventListener("click", () => {
            panel.classList.toggle("is-active");
        });
    });
</script>
</body>
</html>
