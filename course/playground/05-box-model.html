<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playground 05 — max-width + padding</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-neutral-200 min-h-screen;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/lenis@1.3.11/dist/lenis.min.js"></script>
    <script src="../../assets/js/global-lenis.js" defer></script>
</head>
<body class="flex justify-center">
<!-- Same idea as index: full width up to a max, with horizontal padding that steps up -->
<div class="w-full px-4 sm:px-8 py-8 bg-white min-h-screen shadow-sm"><!-- removed: max-w-[40rem] -->
    <p class="text-neutral-700 mb-4">Shrink the browser window: side padding (<code>px-4 sm:px-8</code>) keeps text off the edges.</p>
    <p class="text-neutral-700">Try removing <code>max-w-[40rem]</code> temporarily — the white column grows to full width.</p>
</div>
</body>
</html>
