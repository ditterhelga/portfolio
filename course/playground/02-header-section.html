<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playground 02 — header + section</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-neutral-100 text-neutral-800 p-6;
            }
        }
    </style>
</head>
<body>
<header class="mb-8 border-b border-neutral-300 pb-4">
    <nav class="flex gap-4">
        <a href="#intro" class="underline text-blue-700">Intro</a>
        <a href="#work" class="underline text-blue-700">Work</a>
        <a href="#demo" class="underline text-blue-700">Demo</a>
    </nav>
</header>

<section id="intro" class="min-h-[40vh] scroll-mt-4">
    <h1 class="text-2xl font-semibold mb-2">Intro</h1>
    <p>Add <code>id="demo"</code> on a section and a matching <code>href="#demo"</code> link to practice in-page jumps.</p>
</section>

<section id="work" class="min-h-[40vh] scroll-mt-4">
    <h1 class="text-2xl font-semibold mb-2">Work</h1>
    <p>Second landmark block.</p>
</section>

<section id="demo" class="min-h-[40vh] scroll-mt-4">
    <h1 class="text-2xl font-semibold mb-2">Demo</h1>
    <p>Lalala</p>

</section>

</body>
</html>
